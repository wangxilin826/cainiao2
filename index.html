function getCoord(city, province) {
  if (cityCoords[city]) return cityCoords[city];
  if (provinceCoords[province]) return provinceCoords[province];
  return [116.4, 39.9]; // 默认北京
}

function calcDistance(fromCity, fromProv, toCity, toProv) {
  const [lon1, lat1] = getCoord(fromCity, fromProv);
  const [lon2, lat2] = getCoord(toCity, toProv);
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c);
}

function formatDistance(d) {
  return d.toLocaleString();
}

function calcPrice(service, distance, weight) {
  if (service.minWeight && weight < service.minWeight) {
    return { price: service.basePrice + distance * 0.01 + service.minWeight * service.pricePerKg, minWeight: service.minWeight };
  }
  const distanceFactor = 1 + (distance / 2000) * 0.3;
  const weightPrice = service.basePrice + (weight * service.pricePerKg * distanceFactor * service.weightFactor);
  return { price: Math.round(weightPrice), minWeight: null };
}

// ===== 渲染 =====
function render() {
  document.getElementById('from-city').textContent = state.from.city === state.from.province ? state.from.city : state.from.province + ' ' + state.from.city;
  document.getElementById('to-city').textContent = state.to.city === state.to.province ? state.to.city : state.to.province + ' ' + state.to.city;

  const dist = calcDistance(state.from.city, state.from.province, state.to.city, state.to.province);
  document.getElementById('distance').textContent = formatDistance(dist);

  const container = document.getElementById('price-cards');
  container.innerHTML = '';

  services.forEach((svc, idx) => {
    const { price, minWeight } = calcPrice(svc, dist, state.weight);
    const displayPrice = minWeight ? calcPrice(svc, dist, minWeight).price : price;
    const isRecommended = idx === 0;

    const card = document.createElement('div');
    card.className = `bg-white rounded-xl p-4 shadow-sm border ${isRecommended ? 'border-blue-200 ring-1 ring-blue-100' : 'border-gray-100'} card-hover cursor-pointer fade-in`;
    card.style.animationDelay = `${idx * 0.05}s`;
    card.onclick = () => selectService(svc.key);

    card.innerHTML = `
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-xl flex-shrink-0">${svc.icon}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-0.5">
            <span class="font-bold text-gray-800">${svc.name}</span>
            <span class="text-xs px-1.5 py-0.5 rounded ${svc.tagColor}">${svc.tag}</span>
            ${isRecommended ? '<span class="text-xs text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded">推荐</span>' : ''}
          </div>
          <p class="text-xs text-gray-400">${svc.desc} · 预计 ${svc.timeMin}-${svc.timeMax}天</p>
        </div>
        <div class="text-right flex-shrink-0">
          <div class="flex items-baseline gap-0.5">
            <span class="text-xs text-gray-400">¥</span>
            <span class="text-xl font-bold text-gray-800">${displayPrice}</span>
            <span class="text-xs text-gray-400">起</span>
          </div>
          ${minWeight ? `<p class="text-xs text-gray-400">${minWeight}kg以内</p>` : ''}
        </div>
      </div>
      ${isRecommended ? `
        <div class="mt-3 pt-3 border-t border-gray-50 flex items-center justify-between">
          <span class="text-xs text-gray-400">菜鸟裹裹</span>
          <span class="text-xs text-blue-500 font-medium">已选</span>
        </div>
      ` : ''}
    `;
    container.appendChild(card);
  });
}

function setWeight(w) {
  state.weight = w;
  document.querySelectorAll('.weight-btn').forEach(btn => {
    const bw = parseInt(btn.dataset.weight);
    if (bw === w) {
      btn.className = 'weight-btn flex-1 py-2.5 rounded-lg border-2 border-blue-500 bg-blue-50 text-blue-600 text-sm font-medium transition';
    } else {
      btn.className = 'weight-btn flex-1 py-2.5 rounded-lg border border-gray-200 text-gray-600 text-sm font-medium transition';
    }
  });
  render();
}

function swapCities() {
  const tmp = state.from;
  state.from = state.to;
  state.to = tmp;
  render();
}

function selectService(key) {
  document.querySelectorAll('#price-cards > div').forEach((card, idx) => {
    if (services[idx].key === key) {
      card.classList.add('border-blue-200', 'ring-1', 'ring-blue-100');
    } else {
      card.classList.remove('border-blue-200', 'ring-1', 'ring-blue-100');
    }
  });
}

function goOrder() {
  alert(`即将进入下单页\n\n发货：${state.from.city}\n收货：${state.to.city}\n重量：${state.weight}kg\n\n已自动带入查价信息`);
}

// ===== 省市选择器 =====
function openPicker(type) {
  state.picking = type;
  const current = type === 'from' ? state.from : state.to;
  pickerState.province = current.province;
  pickerState.city = current.city;
  document.getElementById('picker-title').textContent = type === 'from' ? '选择发货地' : '选择收货地';
  document.getElementById('picker-overlay').classList.remove('hidden');
  document.getElementById('picker').classList.remove('hidden');
  renderPicker();
}

function closePicker() {
  document.getElementById('picker-overlay').classList.add('hidden');
  document.getElementById('picker').classList.add('hidden');
  state.picking = null;
}

function confirmPicker() {
  if (state.picking === 'from') {
    state.from = { province: pickerState.province, city: pickerState.city };
  } else {
    state.to = { province: pickerState.province, city: pickerState.city };
  }
  closePicker();
  render();
}

function renderPicker() {
  const provList = document.getElementById('province-list');
  const cityList = document.getElementById('city-list');

  provList.innerHTML = '';
  Object.keys(cityData).forEach(prov => {
    const div = document.createElement('div');
    div.className = `px-4 py-3 text-sm cursor-pointer ${prov === pickerState.province ? 'bg-blue-50 text-blue-600 font-medium' : 'text-gray-700'}`;
    div.textContent = prov;
    div.onclick = () => {
      pickerState.province = prov;
      pickerState.city = cityData[prov][0];
      renderPicker();
    };
    provList.appendChild(div);
  });

  // 滚动到选中省份
  setTimeout(() => {
    const selected = provList.querySelector('.bg-blue-50');
    if (selected) selected.scrollIntoView({ block: 'center' });
  }, 10);

  cityList.innerHTML = '';
  (cityData[pickerState.province] || []).forEach(city => {
    const div = document.createElement('div');
    div.className = `px-4 py-3 text-sm cursor-pointer ${city === pickerState.city ? 'bg-blue-50 text-blue-600 font-medium' : 'text-gray-700'}`;
    div.textContent = city;
    div.onclick = () => {
      pickerState.city = city;
      renderPicker();
    };
    cityList.appendChild(div);
  });

  setTimeout(() => {
    const selected = cityList.querySelector('.bg-blue-50');
    if (selected) selected.scrollIntoView({ block: 'center' });
  }, 10);
}

// 初始化
render();
</script>
</body>
</html>
